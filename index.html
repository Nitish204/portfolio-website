<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vishwakarma Nitish Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- Prism.js for code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
    <style>
        /* glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .glass-dark {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            scroll-behavior: smooth;
            perspective: 1000px;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2ff;
        }
        ::-webkit-scrollbar-thumb {
            background: #a5b4fc;
            border-radius: 12px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #818cf8;
        }
        /* progress bar */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            z-index: 60;
            transition: width 0.1s;
        }
        /* ---- 3D Scroll Animations (different per section) ---- */
        .section-3d {
            opacity: 0;
            transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            will-change: transform, opacity;
        }
        /* About: fade from left with 3D tilt */
        .section-about.visible {
            opacity: 1;
            transform: translateX(0) rotateY(0deg) scale(1);
        }
        .section-about {
            transform: translateX(-60px) rotateY(15deg) scale(0.95);
        }
        /* Skills: scale up with 3D rotation */
        .section-skills.visible {
            opacity: 1;
            transform: scale(1) rotateX(0deg) rotateY(0deg);
        }
        .section-skills {
            transform: scale(0.85) rotateX(10deg) rotateY(-10deg);
        }
        /* Projects: flip up with 3D perspective */
        .section-projects.visible {
            opacity: 1;
            transform: translateY(0) rotateX(0deg);
        }
        .section-projects {
            transform: translateY(60px) rotateX(15deg);
        }
        /* Education: slide from right with 3D twist */
        .section-education.visible {
            opacity: 1;
            transform: translateX(0) rotateY(0deg) rotateZ(0deg);
        }
        .section-education {
            transform: translateX(60px) rotateY(-15deg) rotateZ(2deg);
        }
        /* Contact: scale and rotate with 3D */
        .section-contact.visible {
            opacity: 1;
            transform: scale(1) rotateY(0deg);
        }
        .section-contact {
            transform: scale(0.9) rotateY(20deg);
        }

        /* checkpoint dots */
        .checkpoint-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #c7d2fe;
            border: 2px solid #818cf8;
            transition: all 0.3s;
            display: inline-block;
            margin-right: 0.75rem;
            flex-shrink: 0;
        }
        .checkpoint-dot.active {
            background: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        /* ---- Floating 3D Code Blocks with parallax ---- */
        .float-3d {
            position: absolute;
            pointer-events: none;
            user-select: none;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }
        .float-3d pre {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            padding: 0.75rem;
            font-size: 0.65rem;
            color: #e2e8f0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 220px;
            transform: rotateX(5deg) rotateY(5deg);
            transition: transform 0.3s;
        }
        .float-3d:hover pre {
            transform: rotateX(0deg) rotateY(0deg) scale(1.05);
        }

        /* typing cursor */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: #818cf8;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* 3D decorative symbols */
        .code-symbol-3d {
            font-family: 'Fira Code', monospace;
            color: rgba(79, 70, 229, 0.12);
            font-size: 6rem;
            position: absolute;
            pointer-events: none;
            user-select: none;
            transform: rotateX(20deg) rotateY(30deg) perspective(500px);
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* glow for code blocks */
        .code-glow {
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.15);
        }

        /* 3D card tilt for project cards */
        .project-card-3d {
            transition: transform 0.3s ease;
            transform-style: preserve-3d;
            perspective: 800px;
        }
        .project-card-3d:hover {
            transform: rotateY(3deg) rotateX(3deg) scale(1.02);
        }
    </style>
</head>

            skills: ['Python', 'JavaScript', 'Java', 'C++', 'HTML5', 'CSS3', 'React', 'Node.js', 'Django', 'PostgreSQL', 'Git', 'GitHub', 'DSA', 'Pandas', 'NumPy', 'OpenCV', 'MediaPipe', 'Deep Learning'],
            education: [
                { institution: 'Auroras Technological and Research Institute (ATRI)', degree: 'Bachelor of Technology - BTech, Computer Science and Engineering', period: 'Nov 2022 - May 2026' },

            }]
        };

        // ─── Hook for scroll visibility with section-specific class ──
        function useSectionVisibility(ref, sectionClass) {
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    }, { threshold: 0.15 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [ref]);
            return isVisible;
        }

        // ─── Progress Bar ────────────────────────────────────────────
        const ProgressBar = () => {
            const [progress, setProgress] = useState(0);
            useEffect(() => {
                const handleScroll = () => {
                    const scrollTop = window.scrollY;
                    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                    setProgress(progress);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return <div id="progress-bar" style={{ width: `${progress}%` }}></div>;
        };

        // ─── Parallax mouse effect for floating blocks ──────────────
        const useMouseParallax = (ref, strength = 8) => {
            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!ref.current) return;
                    const { clientX, clientY } = e;
                    const x = (clientX / window.innerWidth - 0.5) * strength;
                    const y = (clientY / window.innerHeight - 0.5) * strength;
                    ref.current.style.transform =
                        `translate(${x}px, ${y}px) rotateX(${y * 0.1}deg) rotateY(${x * 0.1}deg)`;
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, [ref, strength]);
        };

        // ─── Floating 3D Code Block with parallax ──────────────────
        const FloatingCodeBlock = ({ code, className = '', style = {} }) => {
            const ref = useRef(null);
            useMouseParallax(ref, 6);
            return (
                <div ref={ref} className={`float-3d ${className}`} style={style}>
                    <pre className="text-xs text-gray-300 font-mono leading-relaxed">
                        {code}
                    </pre>
                </div>
            );
        };

        // ─── Typing effect component ────────────────────────────────
        const Typewriter = ({ text, speed = 40, className = '' }) => {
            const [displayText, setDisplayText] = useState('');
            const [index, setIndex] = useState(0);
            useEffect(() => {
                if (index < text.length) {
                    const timeout = setTimeout(() => {
                        setDisplayText(prev => prev + text[index]);
                        setIndex(index + 1);
                    }, speed);
                    return () => clearTimeout(timeout);
                }
            }, [index, text, speed]);
            return <span className={className}>{displayText}<span className="typing-cursor"></span></span>;
        };

        // ─── Components ────────────────────────────────────────────────

        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);
            const navItems = ['About', 'Skills', 'Projects', 'Education', 'Contact'];
            const [active, setActive] = useState('home');
            useEffect(() => {
                const handleScroll = () => {
                    const sections = navItems.map(id => document.getElementById(id.toLowerCase()));
                    let current = 'home';
                    sections.forEach((sec, i) => {
                        if (sec) {
                            const rect = sec.getBoundingClientRect();
                            if (rect.top <= 100) current = navItems[i].toLowerCase();
                        }
                    });
                    setActive(current);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return (

                            <span className="text-lg font-bold text-indigo-700 tracking-tight">Nitish<span className="text-indigo-400">.dev</span></span>
                            <div className="hidden md:flex space-x-8 items-center">
                                {navItems.map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`}
                                        className={`text-sm font-medium transition-colors duration-200 ${active === item.toLowerCase() ? 'text-indigo-600 border-b-2 border-indigo-400' : 'text-gray-700 hover:text-indigo-600'}`}>
                                        {item}
                                    </a>
                                ))}
                            </div>
                            <button className="md:hidden text-gray-700" onClick={() => setIsOpen(!isOpen)}>
                                <Icon name={isOpen ? 'x' : 'menu'} className="w-6 h-6" />
                            </button>
                        </div>
                    </div>
                    {isOpen && (
                        <div className="md:hidden glass border-t border-white/20">
                            <div className="px-4 py-2 space-y-2">
                                {navItems.map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="block py-2 text-gray-700 hover:text-indigo-600" onClick={() => setIsOpen(false)}>{item}</a>

                            </div>
                        </div>
                    )}

            );

        const Hero = () => {
            return (
                <section id="home" className="min-h-screen flex items-center justify-center pt-16 px-4 relative overflow-hidden">

                    {/* 3D decorative symbols */}
                    <div className="code-symbol-3d" style={{ top: '8%', left: '3%' }}>{'< />'}</div>
                    <div className="code-symbol-3d" style={{ bottom: '12%', right: '3%' }}>{'{ }'}</div>
                    <div className="code-symbol-3d" style={{ top: '45%', left: '1%' }}>{'[ ]'}</div>
                    <div className="code-symbol-3d" style={{ bottom: '35%', right: '1%' }}>{'( )'}</div>

                    <div className="max-w-5xl mx-auto text-center relative z-10">
                        <div className="glass rounded-3xl p-8 md:p-12 max-w-3xl mx-auto">
                            <h1 className="text-4xl md:text-6xl font-bold text-gray-800 mb-2">{profile.name}</h1>
                            <p className="text-xl md:text-2xl text-indigo-600 font-medium mb-4">{profile.title}</p>
                            {/* Live typing code text */}
                            <div className="mb-6 bg-gray-900/40 backdrop-blur-sm rounded-xl p-4 border border-white/20 text-left font-mono text-sm text-gray-300 overflow-hidden">
                                <span className="text-green-400">$</span>{' '}
                                <Typewriter text="const developer = { name: 'Nitish', role: 'Full Stack & AI', skills: ['Python','React','ML'] };" speed={30} />
                            </div>
                            <div className="flex flex-wrap justify-center gap-3 text-sm text-gray-600 mb-6">
                                <span className="flex items-center gap-1"><Icon name="map" className="w-4 h-4" /> {profile.location}</span>
                                <span className="flex items-center gap-1"><Icon name="mail" className="w-4 h-4" /> {profile.email}</span>
                                <span className="flex items-center gap-1">📱 {profile.phone}</span>
                            </div>
                            <div className="flex justify-center gap-4 mb-6">
                                <a href={profile.github} target="_blank" className="p-2 rounded-full glass-dark hover:shadow-lg transition hover:scale-110">
                                    <Icon name="github" className="w-6 h-6 text-gray-700" />
                                </a>
                                <a href={profile.linkedin} target="_blank" className="p-2 rounded-full glass-dark hover:shadow-lg transition hover:scale-110">
                                    <Icon name="linkedin" className="w-6 h-6 text-gray-700" />

                                <a href={`mailto:${profile.email}`} className="p-2 rounded-full glass-dark hover:shadow-lg transition hover:scale-110">
                                    <Icon name="mail" className="w-6 h-6 text-gray-700" />
                                </a>
                            </div>
                            <a href="#contact" className="inline-flex items-center gap-2 px-6 py-3 bg-indigo-600 text-white rounded-full font-medium shadow-lg hover:bg-indigo-700 transition hover:scale-105">
                                Get in Touch <Icon name="download" className="w-4 h-4" />
                            </a>
                        </div>
                    </div>
                </section>
            );
        };

        // ─── Section wrapper with 3D animation class ──────────────
        const Section3D = ({ id, title, children, className = '', animClass = 'section-about' }) => {
            const ref = useRef(null);
            const isVisible = useSectionVisibility(ref);
            return (
                <section id={id} className={`py-20 px-4 ${className}`}>
                    <div className="max-w-6xl mx-auto">
                        <div className="flex items-center mb-12">
                            <div className="section-checkpoint mr-4">
                                <span className="checkpoint-dot active"></span>
                                <span className="text-xs font-mono text-indigo-500 font-bold hidden sm:inline">0{['about','skills','projects','education','contact'].indexOf(id)+1}</span>
                            </div>
                            <div>
                                <h2 className="text-3xl md:text-4xl font-bold text-gray-800">{title}</h2>
                                <div className="w-16 h-1 bg-indigo-400 rounded-full mt-2"></div>
                            </div>
                        </div>
                        <div ref={ref} className={`section-3d ${animClass} ${isVisible ? 'visible' : ''}`}>
                            {children}
                        </div>
                    </div>
                </section>
            );
        };

        const About = () => (
            <Section3D id="about" title="About Me" animClass="section-about">
                <div className="glass rounded-2xl p-8 md:p-10">
                    <p className="text-gray-700 leading-relaxed text-lg">{profile.summary}</p>
                    <div className="mt-6 flex flex-wrap gap-2">
                        <span className="px-4 py-2 bg-indigo-100/60 backdrop-blur-sm rounded-full text-sm font-medium text-indigo-700">🔍 Open to Internship & FTE</span>
                        <span className="px-4 py-2 bg-indigo-100/60 backdrop-blur-sm rounded-full text-sm font-medium text-indigo-700">🌍 Pan-India & Remote</span>
                    </div>
                </div>
            </Section3D>
        );

        const Skills = () => (
            <Section3D id="skills" title="Tech Stack" animClass="section-skills">
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    {profile.skills.map((skill, i) => (
                        <div key={i} className="glass rounded-xl p-4 text-center font-medium text-gray-700 shadow-sm hover:shadow-md transition hover:scale-105 hover:-translate-y-1 transform-gpu perspective-500">
                            {skill}
                        </div>
                    ))}
                </div>
            </Section3D>
        );

        // Code block with Prism
        const CodeBlock = ({ code, language = 'python' }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    Prism.highlightElement(ref.current);
                }
            }, [code]);
            return (
                <pre className="rounded-xl overflow-hidden border border-white/20 bg-gray-900/30 backdrop-blur-sm p-4 code-glow">
                    <code ref={ref} className={`language-${language}`}>{code}</code>
                </pre>
            );
        };

        const Projects = () => (
            <Section3D id="projects" title="Projects" animClass="section-projects">
                <div className="grid md:grid-cols-2 gap-8">
                    {profile.projects.map((project, idx) => (
                        <div key={idx} className="glass rounded-2xl p-6 shadow-lg hover:shadow-xl transition hover:-translate-y-2 h-full flex flex-col project-card-3d">
                            <h3 className="text-xl font-bold text-gray-800 mb-2">{project.title}</h3>
                            <p className="text-gray-600 mb-3 flex-grow">{project.description}</p>
                            <div className="flex flex-wrap gap-2 mb-4">
                                {project.tech.map((t, i) => (
                                    <span key={i} className="px-3 py-1 bg-indigo-100/60 backdrop-blur-sm rounded-full text-xs font-medium text-indigo-700">{t}</span>
                                ))}
                            </div>
                            <CodeBlock code={project.code} language="python" />
                            <div className="flex gap-3 mt-4">
                                <a href={project.github} target="_blank" className="flex items-center gap-1 px-4 py-2 bg-gray-800/20 backdrop-blur-sm text-gray-800 rounded-full text-sm font-medium hover:bg-gray-800/30 transition hover:scale-105">
                                    <Icon name="github" className="w-4 h-4" /> Code
                                </a>
                                <a href={project.live} target="_blank" className="flex items-center gap-1 px-4 py-2 bg-indigo-600/20 backdrop-blur-sm text-indigo-700 rounded-full text-sm font-medium hover:bg-indigo-600/30 transition hover:scale-105">
                                    <Icon name="external" className="w-4 h-4" /> Live Demo
                                </a>
                            </div>
                        </div>
                    ))}
                </div>
            </Section3D>
        );

        const Education = () => (
            <Section3D id="education" title="Education" animClass="section-education">
                <div className="space-y-6">
                    {profile.education.map((edu, i) => (
                        <div key={i} className="glass rounded-2xl p-6 flex flex-col md:flex-row md:justify-between items-start md:items-center">
                            <div>
                                <h3 className="text-xl font-semibold text-gray-800">{edu.institution}</h3>
                                <p className="text-gray-600">{edu.degree}</p>
                            </div>
                            <span className="text-sm text-indigo-600 font-medium mt-2 md:mt-0">{edu.period}</span>
                        </div>
                    ))}
                </div>
            </Section3D>
        );

        const Contact = () => (
            <Section3D id="contact" title="Let's Connect" animClass="section-contact" className="pb-24">
                <div className="glass rounded-2xl p-8 md:p-10 max-w-2xl mx-auto text-center">
                    <p className="text-gray-600 mb-6">I'm open to internships, full-time roles, and collaborations. Reach out anytime!</p>
                    <div className="flex flex-wrap justify-center gap-4">
                        <a href={`mailto:${profile.email}`} className="flex items-center gap-2 px-6 py-3 bg-indigo-600 text-white rounded-full shadow-md hover:bg-indigo-700 transition hover:scale-105">
                            <Icon name="mail" className="w-5 h-5" /> Email
                        </a>
                        <a href={profile.linkedin} target="_blank" className="flex items-center gap-2 px-6 py-3 bg-gray-200/60 backdrop-blur-sm text-gray-800 rounded-full shadow-md hover:bg-gray-300/60 transition hover:scale-105">
                            <Icon name="linkedin" className="w-5 h-5" /> LinkedIn
                        </a>
                        <a href={profile.github} target="_blank" className="flex items-center gap-2 px-6 py-3 bg-gray-200/60 backdrop-blur-sm text-gray-800 rounded-full shadow-md hover:bg-gray-300/60 transition hover:scale-105">
                            <Icon name="github" className="w-5 h-5" /> GitHub
                        </a>
                    </div>
                </div>
            </Section3D>
        );

        const Footer = () => (
            <footer className="py-6 text-center text-sm text-gray-500 border-t border-white/20 glass">
                <p>© {new Date().getFullYear()} Vishwakarma Nitish · All rights reserrved</p>
            </footer>
        );

        // ─── App ──────────────────────────────────────────────────────
        const App = () => {
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50/80 to-purple-50/80">
                    <ProgressBar />
                    <Navbar />
                    <Hero />
                    <About />
                    <Skills />
                    <Projects />
                    <Education />
                    <Contact />
                    <Footer />
                </div>
            );
        };

        // Mount
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
